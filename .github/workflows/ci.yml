name: github-sanity

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bash ripgrep

      - name: Validate repository contract
        run: |
          test -f Makefile
          test -f STACK.md
          test -f AGENTS.md
          test -f .gitlab-ci.yml
          test -d ci
          test -d services
          test -d helm
          test -d policies
          test -d proto
          test -d scripts/ci
          test -d tests

      - name: Check plaintext secrets
        run: bash scripts/ci/check_no_plaintext_secrets.sh

      - name: Compile Python CI helpers
        run: python -m compileall scripts/ci

      - name: Validate CI security guards
        run: |
          python scripts/ci/check_model_integrity.py
          python scripts/ci/check_audit_chain.py
          python scripts/ci/check_rollback_readiness.py

      - name: Validate SPIFFE and trace wiring
        run: |
          bash scripts/ci/check_spiffe_attestation.sh
          bash scripts/ci/check_ext_authz_fail_closed.sh
          bash scripts/ci/check_trace_propagation.sh

      - name: Upload sanity artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: github-sanity-artifacts
          path: artifacts/reports
          if-no-files-found: warn
