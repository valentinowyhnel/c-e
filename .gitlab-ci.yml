workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  GIT_DEPTH: "0"
  FF_USE_FASTZIP: "true"
  ARTIFACT_DIR: "artifacts"
  OPA_COVERAGE_MIN: "0.80"
  MAX_ALLOWED_FPR: "0.02"
  EXT_AUTHZ_P99_MAX_MS: "250"
  TRUST_ENGINE_P99_MAX_MS: "300"
  MAX_CRITICAL_VULNERABILITIES: "0"
  MIN_SIGNED_ARTIFACTS_RATIO: "1.0"
  HELM_RELEASE_NAME: "cortex"
  KUBE_NAMESPACE: "cortex-system"
  TF_IN_AUTOMATION: "true"
  PY_COLORS: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - preflight
  - validate
  - unit
  - security
  - policy
  - build
  - package
  - integration
  - ephemeral-env
  - e2e
  - resilience
  - ml-guard
  - supply-chain
  - deploy-staging
  - post-deploy-staging
  - deploy-prod-canary
  - post-deploy-prod
  - promote

check-no-plaintext-secrets:
  stage: preflight
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash git ripgrep
  script:
    - bash scripts/ci/check_no_plaintext_secrets.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/secrets.json

trigger-infra:
  stage: validate
  trigger:
    include:
      - local: ci/infra.yml
    strategy: depend

trigger-services:
  stage: unit
  trigger:
    include:
      - local: ci/services.yml
    strategy: depend

trigger-policies:
  stage: policy
  trigger:
    include:
      - local: ci/policies.yml
    strategy: depend

trigger-frontend:
  stage: build
  trigger:
    include:
      - local: ci/frontend.yml
    strategy: depend

trigger-ml:
  stage: ml-guard
  trigger:
    include:
      - local: ci/ml.yml
    strategy: depend

trigger-release:
  stage: deploy-staging
  needs:
    - trigger-infra
    - trigger-services
    - trigger-policies
    - trigger-frontend
    - trigger-ml
  trigger:
    include:
      - local: ci/release.yml
    strategy: depend

