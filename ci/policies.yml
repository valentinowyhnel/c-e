stages:
  - policy

opa-format:
  stage: policy
  image: openpolicyagent/opa:0.68.0-static
  script:
    - opa fmt --fail policies

opa-tests:
  stage: policy
  image: python:3.12-alpine
  before_script:
    - apk add --no-cache bash
    - wget -q -O /usr/local/bin/opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
    - chmod +x /usr/local/bin/opa
  script:
    - sh scripts/ci/run_policy_tests.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/opa-coverage.json

check-policy-regression:
  stage: policy
  image: python:3.12-alpine
  before_script:
    - apk add --no-cache bash
    - wget -q -O /usr/local/bin/opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
    - chmod +x /usr/local/bin/opa
  script:
    - sh scripts/ci/check_policy_regression.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/policy-regression.json
