stages:
  - unit
  - security
  - build
  - package
  - integration
  - e2e
  - resilience

go-unit:
  stage: unit
  image: golang:1.24
  script:
    - bash scripts/ci/run_go_tests.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/go-tests.json

python-unit:
  stage: unit
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends bash git
  script:
    - bash scripts/ci/run_python_tests.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/python-tests.json

check-ext-authz-fail-closed:
  stage: security
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash python3
  script:
    - bash scripts/ci/check_ext_authz_fail_closed.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/ext-authz.json

check-audit-chain:
  stage: security
  image: python:3.12-slim
  script:
    - python scripts/ci/check_audit_chain.py
  artifacts:
    when: always
    paths:
      - artifacts/reports/audit-chain.json

check-trace-propagation:
  stage: security
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash
  script:
    - bash scripts/ci/check_trace_propagation.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/trace-propagation.json

build-services:
  stage: build
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  script:
    - sh scripts/ci/build_images.sh
  artifacts:
    when: always
    paths:
      - artifacts/images/images.txt

package-services:
  stage: package
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash tar
  script:
    - bash scripts/ci/package_services.sh
  artifacts:
    when: always
    paths:
      - artifacts/packages/

integration-k8s:
  stage: integration
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash python3
  script:
    - bash scripts/ci/run_integration_suite.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/integration.json

service-e2e:
  stage: e2e
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash
  script:
    - bash scripts/ci/run_e2e.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/e2e.json

service-resilience:
  stage: resilience
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash
  script:
    - bash scripts/ci/run_resilience.sh
  artifacts:
    when: always
    paths:
      - artifacts/reports/resilience.json

