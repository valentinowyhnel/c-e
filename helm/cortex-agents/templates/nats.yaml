apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cortex-nats
  namespace: cortex-system
spec:
  replicas: 1
  serviceName: cortex-nats
  selector:
    matchLabels:
      app: cortex-nats
  template:
    metadata:
      labels:
        app: cortex-nats
    spec:
      containers:
        - name: nats
          image: nats:2.10.14-alpine
          args:
            - "--jetstream"
            - "--store_dir=/data"
            - "--http_port=8222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-nats
  namespace: cortex-system
spec:
  selector:
    app: cortex-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
