apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-orchestrator
  namespace: cortex-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-orchestrator
  template:
    metadata:
      labels:
        app: cortex-orchestrator
    spec:
      containers:
        - name: cortex-orchestrator
          image: cortex/cortex-orchestrator:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: VLLM_URL
              value: http://cortex-vllm:8080
            - name: SENTINEL_URL
              value: http://cortex-sentinel:8080
            - name: MCP_URL
              value: http://cortex-mcp-server:8080
            - name: CORTEX_COLAB_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: cortex-colab-sync
                  key: shared-secret
                  optional: true
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-orchestrator
  namespace: cortex-system
spec:
  selector:
    app: cortex-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
