apiVersion: batch/v1
kind: Job
metadata:
  name: cortex-ci-smoke
  namespace: {{ .Values.namespace }}
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              {{- range .Values.targets }}
              code="$(curl -s -o /dev/null -w '%{http_code}' {{ .url }})"
              test "$code" = "200"
              {{- end }}
