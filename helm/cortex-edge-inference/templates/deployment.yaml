apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-edge-inference
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: cortex-edge-inference
    app.kubernetes.io/part-of: cortex
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-edge-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-edge-inference
        app.kubernetes.io/part-of: cortex
    spec:
      containers:
        - name: cortex-edge-inference
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CORTEX_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: EDGE_INFERENCE_ENABLED
              value: {{ .Values.featureFlags.edgeInferenceEnabled | quote }}
            - name: EDGE_INFERENCE_SHADOW_MODE
              value: {{ .Values.featureFlags.shadowMode | quote }}
            - name: EDGE_INFERENCE_AUDIT_REQUIRED
              value: {{ .Values.featureFlags.auditRequired | quote }}
            - name: EDGE_INFERENCE_TRUST_FORWARD_ENABLED
              value: {{ .Values.featureFlags.trustForwardEnabled | quote }}
            - name: EDGE_INFERENCE_TRUST_FORWARD_REQUIRED
              value: {{ .Values.featureFlags.trustForwardRequired | quote }}
            - name: TRUST_ENGINE_URL
              value: {{ .Values.serviceUrls.trustEngine | quote }}
            - name: AUDIT_URL
              value: {{ .Values.serviceUrls.audit | quote }}
            - name: CORTEX_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.internalApi.secretName | quote }}
                  key: {{ .Values.internalApi.secretKey | quote }}
                  optional: {{ not .Values.internalApi.required }}
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
