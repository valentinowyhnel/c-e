apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cortex-edge-inference
  namespace: cortex-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cortex-edge-inference
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cortex-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cortex-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
