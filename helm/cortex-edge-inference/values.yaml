replicaCount: 1

environment: preprod

image:
  repository: cortex/cortex-edge-inference
  tag: dev
  pullPolicy: IfNotPresent

internalApi:
  secretName: cortex-internal-api
  secretKey: token
  required: false

featureFlags:
  edgeInferenceEnabled: true
  shadowMode: false
  auditRequired: true
  trustForwardEnabled: true
  trustForwardRequired: true

serviceUrls:
  trustEngine: http://cortex-trust-engine:8080
  audit: http://cortex-audit:8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
