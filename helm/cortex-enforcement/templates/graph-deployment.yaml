apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-graph
  namespace: cortex-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-graph
  template:
    metadata:
      labels:
        app: cortex-graph
    spec:
      containers:
        - name: graph
          image: cortex/cortex-graph:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-graph
  namespace: cortex-system
spec:
  selector:
    app: cortex-graph
  ports:
    - name: http
      port: 8080
      targetPort: 8080
