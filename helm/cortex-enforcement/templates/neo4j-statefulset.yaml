apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cortex-neo4j
  namespace: cortex-system
spec:
  serviceName: cortex-neo4j
  replicas: 1
  selector:
    matchLabels:
      app: cortex-neo4j
  template:
    metadata:
      labels:
        app: cortex-neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.18.1-community
          env:
            - name: NEO4J_AUTH
              value: neo4j/cortex-change-me
            - name: NEO4J_server_memory_heap_initial__size
              value: 256m
            - name: NEO4J_server_memory_heap_max__size
              value: 256m
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-neo4j
  namespace: cortex-system
spec:
  selector:
    app: cortex-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
