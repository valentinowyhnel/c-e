apiVersion: v1
kind: ConfigMap
metadata:
  name: bloodhound-ce-api
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: bloodhound-ce
    app.kubernetes.io/part-of: cortex
data:
  server.py: |
    import json
    import os
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import parse_qs, urlparse

    TIER0 = [item.strip() for item in os.getenv(
        "BLOODHOUND_TIER0",
        "tier0,Domain Admins,Enterprise Admins,Domain Controllers"
    ).split(",") if item.strip()]

    def attack_paths(source: str, target: str) -> list[dict]:
        source_l = source.lower()
        target_l = target.lower()
        if not source or not target:
            return []
        if "tier0" in target_l or any(item.lower() == target_l for item in TIER0):
            return [{
                "nodes": [source, "PrivilegedGroup", target],
                "edges": ["MemberOf", "AdminTo"],
                "length": 2,
            }]
        if any(token in source_l for token in ("admin", "svc", "server", "tier0")):
            return [{
                "nodes": [source, target],
                "edges": ["Reachable"],
                "length": 1,
            }]
        return []

    class Handler(BaseHTTPRequestHandler):
        def _write(self, status: int, payload: dict) -> None:
            body = json.dumps(payload).encode()
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self) -> None:
            parsed = urlparse(self.path)
            if parsed.path in ("/health", "/healthz"):
                self._write(200, {"status": "ok"})
                return
            if parsed.path == "/api/v2/domains/default/tier-zero":
                self._write(200, {"data": [{"objectid": item} for item in TIER0]})
                return
            if parsed.path == "/api/v2/attack-paths":
                params = parse_qs(parsed.query)
                source = params.get("source", [""])[0]
                target = params.get("target", [""])[0]
                self._write(200, {"data": {"paths": attack_paths(source, target)}})
                return
            self._write(404, {"error": "not_found", "path": parsed.path})

        def log_message(self, format: str, *args) -> None:
            return

    if __name__ == "__main__":
        ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bloodhound-ce
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: bloodhound-ce
    app.kubernetes.io/part-of: cortex
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bloodhound-ce
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bloodhound-ce
        app.kubernetes.io/part-of: cortex
    spec:
      containers:
        - name: bloodhound
          image: python:3.12-slim
          command:
            - python
            - /app/server.py
          env:
            - name: BLOODHOUND_TIER0
              value: "tier0,Domain Admins,Enterprise Admins,Domain Controllers"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: api
              mountPath: /app
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: api
          configMap:
            name: bloodhound-ce-api
---
apiVersion: v1
kind: Service
metadata:
  name: bloodhound-ce
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: bloodhound-ce
    app.kubernetes.io/part-of: cortex
spec:
  selector:
    app.kubernetes.io/name: bloodhound-ce
  ports:
    - name: http
      port: 8080
      targetPort: http
