apiVersion: v1
kind: ServiceAccount
metadata:
  name: cortex-otel-collector
  namespace: cortex-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cortex-otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cortex-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cortex-otel-collector
subjects:
  - kind: ServiceAccount
    name: cortex-otel-collector
    namespace: cortex-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: cortex-system
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 500
    exporters:
      prometheusremotewrite:
        endpoint: http://cortex-victoriametrics:8428/api/v1/write
        tls:
          insecure: true
      otlphttp/nats_bridge:
        endpoint: http://cortex-nats-bridge:8080
        tls:
          insecure: true
      logging:
        verbosity: basic
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite, otlphttp/nats_bridge]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/nats_bridge]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/nats_bridge, logging]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/part-of: cortex-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/part-of: cortex-observability
    spec:
      serviceAccountName: cortex-otel-collector
      containers:
        - name: opentelemetry-collector
          image: otel/opentelemetry-collector-contrib:0.101.0
          args:
            - "--config=/conf/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 200Mi
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-collector
  namespace: cortex-system
spec:
  selector:
    app.kubernetes.io/name: opentelemetry-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
