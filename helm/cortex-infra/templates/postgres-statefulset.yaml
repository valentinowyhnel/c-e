apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cortex-postgres
  namespace: cortex-system
spec:
  serviceName: cortex-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16.3-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: cortex
            - name: POSTGRES_USER
              value: cortex
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
          ports:
            - containerPort: 5432
              name: postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "cortex", "-d", "cortex"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cortex", "-d", "cortex"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-postgres
  namespace: cortex-system
spec:
  selector:
    app.kubernetes.io/name: cortex-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
