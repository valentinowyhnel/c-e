apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-victoriametrics
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: cortex-victoriametrics
    app.kubernetes.io/part-of: cortex-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-victoriametrics
        app.kubernetes.io/part-of: cortex-observability
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.99.0
          args:
            - "--storageDataPath=/storage"
            - "--httpListenAddr=:8428"
            - "--retentionPeriod=30d"
          ports:
            - name: http
              containerPort: 8428
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-victoriametrics
  namespace: cortex-system
spec:
  selector:
    app.kubernetes.io/name: cortex-victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
