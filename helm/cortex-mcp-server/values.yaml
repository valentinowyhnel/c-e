environment: preprod

image:
  repository: cortex/cortex-mcp-server
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  sentinelUrl: http://cortex-sentinel:8080
  trustEngineUrl: http://cortex-trust-engine:8080

internalApi:
  secretName: cortex-internal-api
  secretKey: token
  required: false
