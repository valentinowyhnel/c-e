apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cortex-observability-internal
  namespace: cortex-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: cortex-observability
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cortex-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cortex-system
