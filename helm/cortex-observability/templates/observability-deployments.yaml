apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-nats-bridge
  namespace: cortex-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-nats-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-nats-bridge
        app.kubernetes.io/part-of: cortex-observability
    spec:
      containers:
        - name: cortex-nats-bridge
          image: "{{ .Values.images.natsBridge.repository }}:{{ .Values.images.natsBridge.tag }}"
          imagePullPolicy: {{ .Values.images.natsBridge.pullPolicy }}
          env:
            - name: CORTEX_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: NATS_URL
              value: nats://cortex-nats:4222
            - name: CORTEX_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.internalApi.secretName | default "cortex-internal-api" | quote }}
                  key: {{ .Values.internalApi.secretKey | default "token" | quote }}
                  optional: {{ not .Values.internalApi.required }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-nats-bridge
  namespace: cortex-system
spec:
  selector:
    app.kubernetes.io/name: cortex-nats-bridge
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
