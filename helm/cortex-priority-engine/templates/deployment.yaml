apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-priority-engine
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: cortex-priority-engine
    app.kubernetes.io/part-of: cortex
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-priority-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-priority-engine
        app.kubernetes.io/part-of: cortex
    spec:
      containers:
        - name: cortex-priority-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
