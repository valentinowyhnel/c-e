apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cortex-sentinel
  namespace: cortex-system
  labels:
    app: cortex-sentinel
    app.kubernetes.io/name: cortex-sentinel
    app.kubernetes.io/part-of: cortex
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-sentinel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: cortex-sentinel
        app.kubernetes.io/name: cortex-sentinel
        app.kubernetes.io/part-of: cortex
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "cortex-sentinel"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/cortex/sentinel/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/cortex/sentinel/config" -}}
          NATS_URL="{{ .Data.data.nats_url }}"
          TRUST_ENGINE_URL="{{ .Data.data.trust_engine_url }}"
          CORTEX_AUDIT_IP="{{ .Data.data.audit_ip }}"
          {{- end }}
    spec:
      serviceAccountName: cortex-sentinel
      hostPID: false
      hostNetwork: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: sentinel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "sentinel.main"]
          env:
            - name: ENTITY_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ENTITY_TYPE
              value: {{ .Values.entityType | quote }}
            - name: CORTEX_ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: HOME
              value: "/tmp"
            - name: UV_CACHE_DIR
              value: "/tmp/uv-cache"
            - name: VAULT_SECRETS_PATH
              value: "/vault/secrets/config"
            - name: FALCO_LOG_PATH
              value: "/var/log/falco/events.json"
          resources:
{{ toYaml .Values.resources | indent 12 }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            - name: falco-logs
              mountPath: /var/log/falco
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: vault-secrets
          emptyDir:
            medium: Memory
        - name: falco-logs
          hostPath:
            path: /var/log/falco
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
