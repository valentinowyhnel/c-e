environment: preprod

image:
  repository: cortex/cortex-sentinel
  tag: v1-fix3
  pullPolicy: Never

entityType: machine

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 200m

tolerations:
  - key: cortex/sensitive
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
