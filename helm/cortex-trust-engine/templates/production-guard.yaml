{{- if eq .Values.environment "prod" -}}
{{- if or (eq .Values.image.tag "dev") (eq .Values.image.tag "latest") (eq .Values.image.tag "") -}}
{{- fail "cortex-trust-engine: production deployment requires a non-dev immutable image tag" -}}
{{- end -}}
