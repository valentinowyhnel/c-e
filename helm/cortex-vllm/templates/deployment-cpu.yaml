{{- if .Values.cpu.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-phi3
  namespace: cortex-system
  labels:
    app.kubernetes.io/name: vllm-phi3
    app.kubernetes.io/part-of: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-phi3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-phi3
        app.kubernetes.io/part-of: vllm
    spec:
      nodeSelector:
        cortex/node-group: workload
      containers:
        - name: phi3-mini
          image: cortex/cortex-vllm:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-cpu
  namespace: cortex-system
spec:
  selector:
    app.kubernetes.io/name: vllm-phi3
  ports:
    - name: phi3
      port: 8001
      targetPort: 8080
{{- end }}
